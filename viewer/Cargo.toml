[package]
name = "eft_viewer"
version = "0.1.0"
edition = "2021"
description = "Native GPU-driven EFT map viewer consuming .eftpack v1 packs"
publish = false

[dependencies]
bevy = { workspace = true }
# NOTE: no direct `wgpu` dep — all GPU types come via `bevy::render` (its
# re-exports), which guarantees we use the exact wgpu version Bevy vendors and
# never accidentally link two wgpu versions.
bytemuck = { workspace = true }
glam = { workspace = true }
image = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bevy_egui = { workspace = true, optional = true }
# On-demand pathfinding: blocking HTTP POST to the local :8091 GPU pathfind server (GraphQL).
# default-features=false drops rustls/TLS — we only ever hit http://127.0.0.1, no cert machinery.
ureq = { version = "2", default-features = false }
texpresso = "2.0.2"

[features]
# On by default? No — keep the default build robust against bevy_egui version
# skew. Enable with `cargo run --features egui`.
# egui is ON by default now — it drives the right-hand layer-toggle panel (ui.rs).
default = ["egui"]
egui = ["dep:bevy_egui"]

[[bin]]
name = "eft_viewer"
path = "src/main.rs"
